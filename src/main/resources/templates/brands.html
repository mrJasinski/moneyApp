<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
<main>
    <!--/*@thymesVar id="brand" type="com.moneyAppV5.product.dto.BrandDTO"*/-->
    <!--/*@thymesVar id="message" type="java.lang.String"*/-->
    <h2 th:if="${message != null}" th:text="${message}"></h2>
    <form action="#" method="post" th:action="@{/brands}" th:object="${brand}">
        <fieldset>
            <label>Nazwa
                <input th:field="*{name}">
            </label>
            <button type="submit">Dodaj</button>
            <button type="reset">Wyczyść</button>
        </fieldset>
    </form>
    <a th:href="@{/moneys}">Strona główna</a>

    <h3>Marki:</h3>
    <table>
        <tr>
            <td>Nazwa</td>
            <td>Opis</td>
        </tr>
        <tr th:each="brand : ${brandsList}">
            <td th:text="${brand.name}"></td>

        </tr>
    </table>
</main>
</body>
</html>
